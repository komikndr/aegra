services:
  # PostgreSQL database for LangGraph and metadata
  postgres:
    image: pgvector/pgvector:pg18
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Aegra Server
  aegra:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile
    restart: unless-stopped
    ports:
      - "${PORT:-2026}:${PORT:-2026}"
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
      - PYTHONPATH=/app/src
      - REDIS_BROKER_ENABLED=true
      - REDIS_URL=redis://redis:6379/0
      - WORKER_COUNT=3
      - N_JOBS_PER_WORKER=10
      - KEYCLOAK_JWKS_URL=${KEYCLOAK_JWKS_URL:-http://keycloak:8080/realms/${KEYCLOAK_REALM:-aegra}/protocol/openid-connect/certs}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:$${PORT:-2026}/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      - ./aegra.json:/app/aegra.json:ro
      - ./examples:/app/examples:ro
      - ./graphs:/app/graphs:ro
      - ./libs/aegra-api/src:/app/src:ro  # Mount full src for PYTHONPATH to work
      - ./libs/aegra-api/alembic:/app/alembic:ro # for migrations
      - ./keycloak_auth.py:/app/keycloak_auth.py:ro
      - ./custom_routes_example.py:/app/custom_routes_example.py:ro
    command: ["uvicorn", "aegra_api.main:app", "--host", "0.0.0.0", "--port", "${PORT:-2026}", "--reload"]

  # Keycloak (production mode)
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=${KEYCLOAK_ADMIN_USER:-admin}
      - KC_BOOTSTRAP_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:-change-me}
      - KC_HEALTH_ENABLED=true
      - KC_METRICS_ENABLED=true
      - KC_HTTP_ENABLED=true
      - KC_PROXY_HEADERS=xforwarded
      - KC_HOSTNAME=${KEYCLOAK_HOSTNAME:-localhost}
      - KC_HOSTNAME_STRICT=${KEYCLOAK_HOSTNAME_STRICT:-false}
    command: start --http-port=8080 --import-realm
    ports:
      - "8080:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./ops/keycloak/import:/opt/keycloak/data/import:ro
    # restart: unless-stopped

  keycloak-init:
    image: quay.io/keycloak/keycloak:26.0
    depends_on:
      keycloak:
        condition: service_started
    environment:
      - KEYCLOAK_ADMIN_USER=${KEYCLOAK_ADMIN_USER:-admin}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:-change-me}
      - KEYCLOAK_REALM=${KEYCLOAK_REALM:-aegra}
      - MINIO_OIDC_CLIENT_ID=${MINIO_OIDC_CLIENT_ID:-minio-console}
      - MINIO_OIDC_CLIENT_SECRET=${MINIO_OIDC_CLIENT_SECRET:-minio-console-local-secret}
      - MINIO_OIDC_REDIRECT_URI=${MINIO_OIDC_REDIRECT_URI:-http://localhost:9001/oauth_callback}
    volumes:
      - ./ops/keycloak/init-minio-client.sh:/opt/keycloak-init/init-minio-client.sh:ro
    entrypoint: ["/bin/sh", "/opt/keycloak-init/init-minio-client.sh"]
    restart: "no"

  # Redis - enables multi-instance SSE streaming with pub/sub + replay
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  keycloak_data:
